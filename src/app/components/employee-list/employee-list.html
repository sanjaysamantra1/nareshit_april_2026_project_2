<p>employee-list works!</p>

<table class="table table-bordered">
  <tbody>
    @for (emp of employees$ | async; track $index) {
      <tr>
        <td>{{emp.id}}</td>
        <td>{{emp.firstName}}</td>
        <td>{{emp.lastName}}</td>
        <td>{{emp.email}}</td>
        <td>{{emp.gender}}</td>
        <td>{{emp.sal}}</td>
      </tr>
    }
  </tbody>
</table>
